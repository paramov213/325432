<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div id="app">
        <div id="auth-screen" class="screen">
            <div class="auth-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="80" alt="Logo">
                <h2>Войти в Telegram</h2>
                <input type="text" id="auth-login" placeholder="Ваш логин (@username)">
                <input type="password" id="auth-pass" placeholder="Пароль">
                <p id="auth-error" class="error-msg"></p>
                <div class="auth-buttons">
                    <button onclick="App.auth.login()">Вход</button>
                    <button onclick="App.auth.register()" class="secondary">Регистрация</button>
                </div>
            </div>
        </div>

        <div id="main-screen" class="screen hidden">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="user-info">
                        <div class="avatar-container" id="my-avatar-container">
                            <img src="https://via.placeholder.com/40" id="my-avatar" alt="Me">
                        </div>
                        <span id="my-name">Загрузка...</span>
                    </div>
                    <input type="text" id="user-search" placeholder="Поиск @username..." oninput="App.chat.search()">
                </div>
                <div id="chat-list" class="chat-list">
                    </div>
            </aside>

            <main class="chat-window">
                <div id="chat-placeholder">Выберите, кому хотели бы написать</div>
                <div id="active-chat" class="hidden">
                    <header class="chat-header">
                        <div class="chat-user-meta">
                            <strong id="chat-with-name">Имя</strong>
                            <span id="chat-with-status">в сети</span>
                        </div>
                        <div class="header-actions">
                            <button onclick="App.rtc.call()">📞</button>
                        </div>
                    </header>
                    <div id="messages-container" class="messages-container">
                        </div>
                    <footer class="chat-footer">
                        <div id="typing-indicator" class="typing-indicator"></div>
                        <div class="input-wrapper">
                            <button id="voice-btn" onmousedown="App.media.startRecord()" onmouseup="App.media.stopRecord()">🎤</button>
                            <input type="text" id="msg-input" placeholder="Напишите сообщение..." oninput="App.chat.handleTyping()">
                            <button onclick="App.chat.sendMessage()">➡️</button>
                        </div>
                    </footer>
                </div>
            </main>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
